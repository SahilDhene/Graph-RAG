version: "3.9"

services:
  arangodb:
    image: arangodb:3.12
    container_name: graphrag-arango
    restart: unless-stopped
    ports:
      - "8529:8529"
    environment:
      ARANGO_ROOT_PASSWORD: graphrag123
    volumes:
      - arango-data:/var/lib/arangodb3
      - arango-apps:/var/lib/arangodb3-apps

volumes:
  arango-data:
  arango-apps:
